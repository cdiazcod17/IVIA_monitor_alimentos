<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}IVIA Monitor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    {% if user.is_authenticated %}
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="{% url 'devices:list' %}">
                <i class="bi bi-cpu me-2"></i>IVIA Monitor
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">
                    <a href="{% url 'devices:list' %}"> {{ user.first_name }} {{ user.last_name }} </a>
                </span>
                <a class="nav-link" href="{% url 'users:signout' %}">
                    <i class="bi bi-box-arrow-right"></i> Salir
                </a>
            </div>
        </div>
    </nav>
    {% else %}
    {% include 'navbar.html' %}
    {% endif %}

    <main>{% block content %}{% endblock %}</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
